<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CI/CD Pipeline Demo (Python + Flask)</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="card">
    <div class="badge">● Deployed via CI/CD</div>
    <h1>Hello from a Python Flask app 🐍🚀</h1>
    <p>
      This page was tested with <strong>pytest</strong>, containerized with
      Docker, and deployed automatically by <strong>GitHub Actions</strong> —
      no manual steps.
    </p>
    <div class="meta">
      <span>Build: <code>#{{ build }}</code></span>
      <span>Commit: <code>{{ commit }}</code></span>
    </div>
    <footer>Built by Rishabh Tripathi</footer>
  </main>
</body>
</html>
