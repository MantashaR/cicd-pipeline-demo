<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CI/CD Pipeline Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card">
    <div class="badge" id="status">● Deployed via CI/CD</div>
    <h1>Hello from an Automated Pipeline 🚀</h1>
    <p>
      This page was tested, containerized with Docker, and deployed
      automatically by <strong>GitHub Actions</strong> — no manual steps.
    </p>
    <div class="meta">
      <span>Build: <code id="build">#local</code></span>
      <span>Commit: <code id="commit">dev</code></span>
    </div>
    <footer>Built by Rishabh Tripathi</footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
