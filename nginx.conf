server {
  listen       80;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # Render (and most PaaS) inject a $PORT, but nginx listens on 80 inside
  # the container; the platform maps it. Static files served directly.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Lightweight cache headers for assets.
  location ~* \.(css|js)$ {
    expires 1h;
    add_header Cache-Control "public";
  }
}
